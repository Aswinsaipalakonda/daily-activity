name: Daily Commit

on:
  schedule:
    - cron: "0 3 * * *"   # 8:30 AM IST
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make changes
        run: |
          echo "Updated on $(date)" >> log.txt

      - name: Commit and push
        run: |
          git config --global user.name "AswinsaiPalakonda"
          git config --global user.email "aswinsaipalakonda"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
